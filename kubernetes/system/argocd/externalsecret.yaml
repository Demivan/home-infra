apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: argocd-oidc-secret
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: oidc.default.clientID
      remoteRef:
        key: argocd-oidc-client-id
    - secretKey: oidc.default.clientSecret
      remoteRef:
        key: argocd-oidc-client-secret
