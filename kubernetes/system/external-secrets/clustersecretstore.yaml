# ESO authenticates with Infisical via Kubernetes Auth (service account token).
# No bootstrap secret needed — just the Machine Identity ID.
#
# Infisical setup required:
# 1. Add Kubernetes Auth to your Machine Identity with:
#    - Kubernetes Host: https://<SERVER_IP>:6443
#    - Allowed SA Names: external-secrets
#    - Allowed Namespaces: external-secrets
#    - CA Cert: kubectl get cm kube-root-ca.crt -n kube-public -o jsonpath='{.data.ca\.crt}'
# 2. Add identity to project with Viewer role
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: https://app.infisical.com/api
      auth:
        kubernetesAuthCredentials:
          identityId:
            name: infisical-identity
            namespace: external-secrets
            key: identityId
      secretsScope:
        projectSlug: home-infra-5i8l
        environmentSlug: prod
        secretsPath: "/"
