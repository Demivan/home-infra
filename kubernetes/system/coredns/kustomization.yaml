apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: coredns
    repo: https://coredns.github.io/helm
    version: "1.45.2"
    releaseName: coredns
    namespace: kube-system
    valuesInline:
      fullnameOverride: coredns
      k8sAppLabelOverride: kube-dns
      isClusterService: true
      replicaCount: 2
      serviceAccount:
        create: true
      clusterRole:
        nameOverride: "system:coredns"
      deployment:
        selector:
          matchLabels:
            k8s-app: kube-dns
      service:
        name: kube-dns
        clusterIP: "10.0.8.10"
      servers:
        - zones:
            - zone: ts.net
          port: 53
          plugins:
            - name: errors
            - name: cache
              parameters: "30"
            - name: forward
              parameters: . 10.0.8.53
        - zones:
            - zone: .
          port: 53
          plugins:
            - name: errors
            - name: health
              configBlock: |-
                lameduck 5s
            - name: ready
            - name: rewrite
              parameters: "name regex ([a-zA-Z0-9-]+)\\.home\\.demivan\\.me cilium-gateway-internal.cilium-gateway.svc.cluster.local answer auto"
            - name: log
              parameters: .
              configBlock: |-
                class error
            - name: prometheus
              parameters: :9153
            - name: kubernetes
              parameters: cluster.local in-addr.arpa ip6.arpa
              configBlock: |-
                pods insecure
                fallthrough in-addr.arpa ip6.arpa
                ttl 30
            - name: forward
              parameters: . /etc/resolv.conf
              configBlock: |-
                max_concurrent 1000
            - name: cache
              parameters: "30"
              configBlock: |-
                disable success cluster.local
                disable denial cluster.local
            - name: loop
            - name: reload
            - name: loadbalance
