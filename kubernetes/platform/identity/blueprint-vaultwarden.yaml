apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-vaultwarden
  namespace: identity
data:
  vaultwarden.yaml: |
    version: 1
    metadata:
      name: vaultwarden-oidc
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.scopemapping
        state: present
        identifiers:
          scope_name: email
          managed: goauthentik.io/providers/oauth2/scope-email-custom
        attrs:
          name: "Email (verified)"
          scope_name: email
          expression: |
            return {
                "email": request.user.email,
                "email_verified": True,
            }
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Vaultwarden
        attrs:
          name: Vaultwarden
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: !Env VAULTWARDEN_OIDC_CLIENT_ID
          client_secret: !Env VAULTWARDEN_OIDC_CLIENT_SECRET
          redirect_uris:
            - url: "https://vault.home.demivan.me/identity/connect/oidc-signin"
              matching_mode: strict
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email-custom]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: vaultwarden
        attrs:
          name: Vaultwarden
          slug: vaultwarden
          policy_engine_mode: any
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Vaultwarden]]
          meta_launch_url: "https://vault.home.demivan.me"
