apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: authentik-secrets
  data:
    - secretKey: secret-key
      remoteRef:
        key: authentik-secret-key
    - secretKey: db-password
      remoteRef:
        key: authentik-db-password
