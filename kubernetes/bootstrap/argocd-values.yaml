global:
  domain: argocd.kube.demivan.me

configs:
  cm:
    kustomize.buildOptions: --enable-helm
  params:
    server.insecure: true  # TLS terminated at Gateway API level
    controller.diff.server.side: "true"

server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
